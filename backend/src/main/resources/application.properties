# ============================================================
#  FLOWER SHOP — application.properties  (Hyderabad)
# ============================================================

server.port=8080

# ---- MySQL ----
spring.datasource.url=jdbc:mysql://localhost:3306/flowerdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- JWT ----
app.jwt.secret=FlowerShopSuperSecretKey2024MustBe256BitsLong!!
app.jwt.expiration-ms=86400000

# ---- CORS (add port 3001 if needed) ----
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# ---- Admin credentials (for first-time seed) ----
app.admin.email=admin@gmail.com
app.admin.password=admin123

# ---- Shop GPS  (Hyderabad — Rasapudipalem area) ----
shop.name=Pooja Flowers Hyderabad
shop.location.lat=17.525450
shop.location.lon=78.368997
shop.delivery.max-km=12

# ---- Razorpay (replace with your real keys from razorpay.com/app/keys) ----
# Test keys below — safe to use for testing, NO real money is charged
razorpay.key.id=rzp_test_SYt2PsM4MB7gUw
razorpay.key.secret=4daPrAvOcVKu1fpSUnWiThzf

# ---- File Upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/products
spring.web.resources.static-locations=classpath:/static/,file:./


